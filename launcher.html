<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>BIOSVIZ — Launch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #050a0f;
            --panel: #090e14;
            --panel2: #0d1520;
            --border: #1a2535;
            --accent: #00d4ff;
            --accent2: #0099cc;
            --text: #e2e8f0;
            --muted: #64748b;
            --green: #00ff9f;
            --red: #f87171;
            --yellow: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0, 212, 255, .15) 0%, transparent 70%);
            padding: 24px;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ── Settings Btn ── */
        .settings-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            fill: none;
            stroke: var(--muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .settings-btn:hover {
            stroke: var(--accent);
            transform: rotate(45deg) scale(1.1);
        }

        /* ── Hero ── */
        .hero {
            text-align: center;
            margin-bottom: 40px
        }

        .logo-big {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px
        }

        .logo-big span {
            color: var(--accent)
        }

        .logo-big em {
            color: #fff;
            font-style: normal
        }

        .tagline {
            color: var(--muted);
            margin-top: 8px;
            font-size: 15px;
            font-weight: 300
        }

        .badge {
            display: inline-block;
            background: rgba(0, 212, 255, .12);
            border: 1px solid rgba(0, 212, 255, .25);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 12px
        }

        /* ── Card ── */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
        }

        /* ── Input area ── */
        .input-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .6px
        }

        .path-wrap {
            position: relative;
            display: flex;
            gap: 8px
        }

        #path-input {
            flex: 1;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            outline: none;
            transition: border-color .2s;
        }

        #path-input:focus {
            border-color: var(--accent)
        }

        #path-input::placeholder {
            color: var(--muted)
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all .15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #000
        }

        .btn-primary:hover {
            background: var(--accent2);
            transform: translateY(-1px)
        }

        .btn-primary:disabled {
            background: var(--muted);
            cursor: not-allowed;
            transform: none
        }

        .btn-ghost {
            background: var(--panel2);
            color: var(--muted);
            border: 1px solid var(--border)
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        /* ── Recents ── */
        .recents {
            margin-top: 12px
        }

        .recents-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px
        }

        .recent-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .recent-chip {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: monospace;
            transition: all .12s;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .recent-chip:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .recent-chip .rm {
            margin-left: 4px;
            opacity: .5
        }

        .recent-chip .rm:hover {
            opacity: 1;
            color: var(--red)
        }

        /* ── Progress ── */
        #progress-wrap {
            margin-top: 20px;
            display: none
        }

        #progress-wrap.show {
            display: block
        }

        .prog-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px
        }

        .prog-label {
            font-size: 13px;
            color: var(--text);
            font-weight: 500
        }

        .prog-right {
            display: flex;
            gap: 12px;
            align-items: center
        }

        .prog-pct {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            min-width: 36px;
            text-align: right
        }

        .prog-eta {
            font-size: 11px;
            color: var(--muted)
        }

        .prog-elapsed {
            font-size: 11px;
            color: var(--muted)
        }

        .prog-bar-bg {
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, .4);
        }

        .prog-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent2), var(--accent), var(--green));
            background-size: 200% 100%;
            border-radius: 6px;
            width: 0%;
            transition: width .5s cubic-bezier(.4, 0, .2, 1);
            animation: shimmer 2s linear infinite;
            position: relative;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .prog-bar.done {
            animation: none;
            background: var(--green)
        }

        /* ── Progress CLI ── */
        #cli-msg-area {
            margin-top: 24px;
            padding: 0 8px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            color: var(--text);
            min-height: 140px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cli-line {
            line-height: 1.4;
        }

        .cli-line .step {
            color: var(--accent);
            margin-right: 8px;
            font-weight: 600;
            text-transform: lowercase;
        }

        .cli-line .status {
            color: var(--muted);
        }

        .cli-line.active .status {
            color: var(--text);
        }

        .cli-line.done .status {
            color: var(--green);
        }

        /* ── Stats Row ── */
        #stats-row {
            display: none;
            margin-top: 20px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        #stats-row.visible {
            display: grid
        }

        .stat-box {
            text-align: center
        }

        .stat-box .val {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent)
        }

        .stat-box .lbl {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        /* ── Error / Done ── */
        #msg-area {
            margin-top: 16px;
            min-height: 28px
        }

        .msg-error {
            color: var(--red);
            font-size: 13px;
            padding: 10px 14px;
            background: rgba(248, 113, 113, .08);
            border: 1px solid rgba(248, 113, 113, .2);
            border-radius: 8px
        }

        .msg-done {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(0, 255, 159, .06);
            border: 1px solid rgba(0, 255, 159, .2);
            border-radius: 8px;
        }

        .msg-done span {
            color: var(--green);
            font-size: 13px;
            font-weight: 500
        }

        /* ── How-to ── */
        .howto {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.8
        }

        .howto code {
            background: var(--panel2);
            border: 1px solid var(--border);
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text);
        }

        .howto a {
            color: var(--accent);
            text-decoration: none
        }

        .howto a:hover {
            text-decoration: underline
        }

        /* ── Footer ── */
        footer {
            margin-top: 24px;
            font-size: 11px;
            color: var(--muted);
            text-align: center
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .card {
            animation: fadeIn .4s ease both
        }
    </style>
</head>

    <script>
        // ─── State ────────────────────────────────────────────────────────────────────
        let currentJob = null;
        let pollTimer = null;
        let startTime = null;
        let etaTimer = null;
        let lastPct = 0;
        let pctHistory = []; // [{t, pct}] for ETA estimation

        // Step thresholds: [pct_start, label]
        const STEPS = [
            [0, 'scan'],
            [10, 'analyze'],
            [60, 'index'],
            [70, 'edges'],
            [85, 'funcs'],
            [98, 'html'],
        ];

        // ─── Recents (localStorage) ───────────────────────────────────────────────────
        function getRecents() {
            try { return JSON.parse(localStorage.getItem('biosviz_recents') || '[]'); }
            catch { return []; }
        }
        function addRecent(path) {
            let r = getRecents().filter(p => p !== path);
            r.unshift(path);
            r = r.slice(0, 6);
            localStorage.setItem('biosviz_recents', JSON.stringify(r));
            renderRecents();
        }
        function removeRecent(path) {
            let r = getRecents().filter(p => p !== path);
            localStorage.setItem('biosviz_recents', JSON.stringify(r));
            renderRecents();
        }
        function renderRecents() {
            const r = getRecents();
            const wrap = document.getElementById('recents-wrap');
            const list = document.getElementById('recent-list');
            wrap.style.display = r.length ? '' : 'none';
            list.innerHTML = '';
            r.forEach(p => {
                const span = document.createElement('span');
                span.className = 'recent-chip';
                span.textContent = p + ' ';
                span.onclick = () => useRecent(p);

                const rm = document.createElement('span');
                rm.className = 'rm';
                rm.textContent = '✕';
                rm.onclick = (e) => { e.stopPropagation(); removeRecent(p); };

                span.appendChild(rm);
                list.appendChild(span);
            });
        }

        function useRecent(path) {
            document.getElementById('path-input').value = path;
        }

        window.onload = function () {
            document.getElementById('path-input').focus();
            renderRecents();
            initPreferences(); // Call the new initPreferences
        };

        function applyFont(font) {
            document.documentElement.style.setProperty('--code-font', font);
            document.documentElement.style.setProperty('--ui-font', font);
            document.body.style.fontFamily = font + ', Inter, sans-serif';
        }

        // Initialize preferences
        function initPreferences() {
            const fontSelect = document.getElementById('font-select');
            const savedFont = getSavedFont();
            if (fontSelect) {
                fontSelect.value = savedFont;
                fontSelect.style.fontFamily = savedFont; // Apply font to the select itself
                applyFont(savedFont); // Apply font to the document
            }

            // Replaced the old pref-btn logic with global functions above for the top-right button
            const prefCloseBtn = document.getElementById('pref-close-btn');
            const prefCloseX = document.getElementById('pref-close-x');
            const prefModal = document.getElementById('pref-modal'); // Get modal for outside click

            if (prefCloseBtn) prefCloseBtn.addEventListener('click', closePrefModal);
            if (prefCloseX) prefCloseX.addEventListener('click', closePrefModal);
            if (prefModal) prefModal.addEventListener('click', (e) => { if (e.target === prefModal) closePrefModal(); });

            if (fontSelect) {
                fontSelect.addEventListener('change', (e) => {
                    const val = e.target.value;
                    localStorage.setItem('codeviz-font', val);
                    applyFont(val);
                    fontSelect.style.fontFamily = val;
                });
            }
        }
        // ─── Analysis ─────────────────────────────────────────────────────────────────
        async function startAnalysis() {
            const path = document.getElementById('path-input').value.trim();
            if (!path) { showMsg('error', 'Please enter a path'); return; }

            setAnalyzing(true);
            showMsg('', '');
            document.getElementById('stats-row').classList.remove('visible');
            startTime = Date.now();
            pctHistory = [];
            lastPct = 0;
            setProgress(0, 'Sending request...');
            startElapsedTimer();

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path }),
                });
                const data = await res.json();

                if (data.error) { showMsg('error', data.error); setAnalyzing(false); return; }

                currentJob = data.job_id;
                addRecent(path);
                pollProgress();

            } catch (e) {
                showMsg('error', 'Cannot connect to server. Is server.py running?');
                setAnalyzing(false);
            }
        }

        async function pollProgress() {
            if (!currentJob) return;
            try {
                const res = await fetch(`/progress?job=${currentJob}`);
                const job = await res.json();

                setProgress(job.pct, job.msg);

                if (job.error) {
                    showMsg('error', job.error);
                    stopTimers(); setAnalyzing(false);
                    currentJob = null;
                    return;
                }
                if (job.done) {
                    setProgress(100, 'Done!');
                    if (job.stats) showStats(job.stats);
                    showMsg('done', `${job.size_kb || '?'}KB HTML ready`, currentJob);
                    stopTimers(); setAnalyzing(false);
                    currentJob = null;
                    return;
                }
            } catch (e) {
                // server busy, retry
            }
            pollTimer = setTimeout(pollProgress, 600);
        }

        // ─── Preferences ──────────────────────────────────────────────────────────────
        function openPrefModal() {
            document.getElementById('pref-modal').style.display = 'flex';
        }

        function closePrefModal() {
            document.getElementById('pref-modal').style.display = 'none';
        }

        function getSavedFont() {
            return localStorage.getItem('codeviz-font') || "'JetBrains Mono', monospace";
        }

        // ─── UI Helpers ───────────────────────────────────────────────────────────────
        function setAnalyzing(v) {
            const btn = document.getElementById('analyze-btn');
            const pw = document.getElementById('progress-wrap');
            btn.disabled = v;
            btn.textContent = v ? '⏳ Analyzing...' : '▶ Analyze';
            if (v) pw.classList.add('show');
            else pw.classList.remove('show');
            if (!v) { // reset steps
                document.getElementById('prog-bar').classList.remove('done');
                const cliArea = document.getElementById('cli-msg-area');
                if (cliArea) cliArea.innerHTML = '';
            }
            window.bgAnalyzing = v;
        }

        function startElapsedTimer() {
            clearInterval(etaTimer);
            etaTimer = setInterval(() => {
                if (!startTime) return;
                const sec = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('prog-elapsed').textContent = `${fmtSec(sec)} elapsed`;
            }, 1000);
        }

        function stopTimers() {
            clearTimeout(pollTimer);
            clearInterval(etaTimer);
        }

        function fmtSec(s) {
            if (s < 60) return s + 's';
            return Math.floor(s / 60) + 'm' + (s % 60).toString().padStart(2, '0') + 's';
        }

        function setProgress(pct, msg) {
            const bar = document.getElementById('prog-bar');
            bar.style.width = pct + '%';
            document.getElementById('prog-pct').textContent = pct + '%';

            // ETA estimation
            const now = Date.now();
            if (startTime && pct > 0 && pct < 100) {
                pctHistory.push({ t: now, pct });
                if (pctHistory.length > 6) pctHistory.shift();
                if (pctHistory.length >= 2) {
                    const dt = now - pctHistory[0].t;
                    const dp = pct - pctHistory[0].pct;
                    if (dp > 0) {
                        const remaining = (100 - pct) / dp * dt / 1000;
                        document.getElementById('prog-eta').textContent =
                            remaining < 3600 ? `ETA ~${fmtSec(Math.ceil(remaining))}` : '';
                    }
                }
            } else if (pct === 0) {
                document.getElementById('prog-eta').textContent = '';
            } else if (pct === 100) {
                document.getElementById('prog-eta').textContent = '';
                document.getElementById('prog-label').textContent = 'Complete ✓';
                bar.classList.add('done');
            }

            if (pct > 0 && pct < 100) {
                document.getElementById('prog-label').textContent = 'Analyzing...';
            }

            // Update CLI area
            const cliArea = document.getElementById('cli-msg-area');
            if (cliArea) {
                let cliHtml = '';
                for (let i = 0; i < STEPS.length; i++) {
                    const [threshold, label] = STEPS[i];
                    const nextThreshold = i < STEPS.length - 1 ? STEPS[i + 1][0] : 100;

                    if (pct >= threshold || (pct === 0 && threshold === 0)) {
                        if (pct >= nextThreshold || pct === 100) {
                            cliHtml += `<div class="cli-line done"><span class="step">${label}</span><span class="status">-&gt; done</span></div>`;
                        } else {
                            cliHtml += `<div class="cli-line active"><span class="step">${label}</span><span class="status">(${msg})...</span></div>`;
                        }
                    }
                }
                if (cliArea.innerHTML !== cliHtml) {
                    cliArea.innerHTML = cliHtml;
                    cliArea.scrollTop = cliArea.scrollHeight;
                }
            }
        }

        function showStats(s) {
            const row = document.getElementById('stats-row');
            document.getElementById('s-files').textContent = s.files?.toLocaleString() || '—';
            document.getElementById('s-mods').textContent = s.modules || '—';
            document.getElementById('s-funcs').textContent = s.functions?.toLocaleString() || '—';
            document.getElementById('s-calls').textContent = s.calls?.toLocaleString() || '—';
            row.classList.add('visible');
        }

        function showMsg(type, text, jobId) {
            const area = document.getElementById('msg-area');
            if (!type || !text) { area.innerHTML = ''; return; }
            if (type === 'error') {
                area.innerHTML = `<div class="msg-error">⚠ ${text}</div>`;
            } else if (type === 'done') {
                area.innerHTML = `
      <div class="msg-done">
        <span>✓ Analysis complete</span>
        <a href="/result?job=${jobId}" target="_blank" class="btn btn-primary" style="font-size:12px;padding:8px 14px">
          Open Visualization →
        </a>
      </div>`;
            }
        }

        // ─── Enter key ────────────────────────────────────────────────────────────────
        document.getElementById('path-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') startAnalysis();
        });

        // ─── Init ─────────────────────────────────────────────────────────────────────
        renderRecents();

        // Pre-fill last used path
        const recents = getRecents();
        if (recents[0] && !document.getElementById('path-input').value) {
            document.getElementById('path-input').value = recents[0];
        }

        // ─── 3D Background Canvas Animation ──────────────────────────────────────────
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        const nodes = [];
        const edges = [];
        let signals = [];
        window.bgAnalyzing = false;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const NUM_NODES = 120;
        const RADIUS = 800;
        for (let i = 0; i < NUM_NODES; i++) {
            nodes.push({
                x: (Math.random() - 0.5) * RADIUS * 2,
                y: (Math.random() - 0.5) * RADIUS * 2,
                z: (Math.random() - 0.5) * RADIUS * 2,
                connections: []
            });
        }

        for (let i = 0; i < NUM_NODES; i++) {
            let dists = [];
            for (let j = 0; j < NUM_NODES; j++) {
                if (i === j) continue;
                let dx = nodes[i].x - nodes[j].x;
                let dy = nodes[i].y - nodes[j].y;
                let dz = nodes[i].z - nodes[j].z;
                dists.push({ j, d: Math.sqrt(dx * dx + dy * dy + dz * dz) });
            }
            dists.sort((a, b) => a.d - b.d);
            for (let k = 0; k < 3; k++) {
                let j = dists[k].j;
                let exists = edges.some(e => (e.a === i && e.b === j) || (e.a === j && e.b === i));
                if (!exists) {
                    let edge = { a: i, b: j };
                    edges.push(edge);
                    nodes[i].connections.push(edge);
                    nodes[j].connections.push(edge);
                }
            }
        }

        let angleX = 0;
        let angleY = 0;
        const fov = 700;

        function drawBg() {
            requestAnimationFrame(drawBg);
            ctx.clearRect(0, 0, w, h);

            angleY += 0.0002;
            angleX += 0.0001;

            const cosX = Math.cos(angleX);
            const sinX = Math.sin(angleX);
            const cosY = Math.cos(angleY);
            const sinY = Math.sin(angleY);

            const projNodes = nodes.map(n => {
                let x1 = n.x * cosY - n.z * sinY;
                let z1 = n.z * cosY + n.x * sinY;

                let y2 = n.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + n.y * sinX;

                let z3 = z2 + RADIUS + 400;
                let scale = fov / z3;
                let x2d = (x1 * scale) + w / 2;
                let y2d = (y2 * scale) + h / 2;

                return { x: x2d, y: y2d, scale, z3 };
            });

            ctx.lineWidth = 1;
            for (let e of edges) {
                let pA = projNodes[e.a];
                let pB = projNodes[e.b];

                let zAvg = (pA.z3 + pB.z3) / 2;
                let alpha = 1 - (zAvg / (RADIUS * 2.5));
                if (alpha < 0) alpha = 0;

                ctx.strokeStyle = `rgba(0, 212, 255, ${alpha * 0.15})`;
                ctx.beginPath();
                ctx.moveTo(pA.x, pA.y);
                ctx.lineTo(pB.x, pB.y);
                ctx.stroke();
            }

            for (let p of projNodes) {
                let alpha = 1 - (p.z3 / (RADIUS * 2.5));
                if (alpha < 0) alpha = 0;

                ctx.fillStyle = `rgba(226, 232, 240, ${alpha * 0.5})`;
                ctx.beginPath();
                let r = 1.8 * p.scale;
                ctx.arc(p.x, p.y, r > 0 ? r : 0.01, 0, Math.PI * 2);
                ctx.fill();
            }

            // Base absolute travel speed in 3D units per frame
            const CONSTANT_SPEED = 7; // Slowed down from 15

            // Signal logic
            if (window.bgAnalyzing && signals.length < 2) {
                if (Math.random() < 0.1) {
                    let startIdx = Math.floor(Math.random() * nodes.length);
                    let conns = nodes[startIdx].connections;
                    if (conns.length > 0) {
                        let edge = conns[Math.floor(Math.random() * conns.length)];

                        let nextIdx = edge.a === startIdx ? edge.b : edge.a;
                        let dx = nodes[startIdx].x - nodes[nextIdx].x;
                        let dy = nodes[startIdx].y - nodes[nextIdx].y;
                        let dz = nodes[startIdx].z - nodes[nextIdx].z;
                        let dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        signals.push({
                            edge,
                            src: startIdx,
                            tgt: nextIdx,
                            prevSrc: -1,
                            progress: 0,
                            speed: CONSTANT_SPEED / Math.max(1, dist) // Const speed calculation
                        });
                    }
                }
            } else if (!window.bgAnalyzing && signals.length > 0) {
                signals = [];
            }

            for (let i = signals.length - 1; i >= 0; i--) {
                let sig = signals[i];
                sig.progress += sig.speed;

                if (sig.progress >= 1) {
                    let nextIdx = sig.tgt;
                    let conns = nodes[nextIdx].connections;

                    let validConns = conns.filter(c => {
                        let potentialTgt = c.a === nextIdx ? c.b : c.a;
                        return potentialTgt !== sig.src;
                    });

                    let nextEdgePool = validConns.length > 0 ? validConns : conns;

                    if (nextEdgePool.length > 0) {
                        let nextEdge = nextEdgePool[Math.floor(Math.random() * nextEdgePool.length)];

                        let nextTgt = nextEdge.a === nextIdx ? nextEdge.b : nextEdge.a;
                        let dx = nodes[nextIdx].x - nodes[nextTgt].x;
                        let dy = nodes[nextIdx].y - nodes[nextTgt].y;
                        let dz = nodes[nextIdx].z - nodes[nextTgt].z;
                        let dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        sig.edge = nextEdge;
                        sig.prevSrc = sig.src;
                        sig.src = nextIdx;
                        sig.tgt = nextTgt;
                        sig.progress = 0;
                        sig.speed = CONSTANT_SPEED / Math.max(1, dist); // Update speed
                    } else {
                        signals.splice(i, 1);
                        continue;
                    }
                }

                let pA = projNodes[sig.src];
                let pB = projNodes[sig.tgt];
                let cx = pA.x + (pB.x - pA.x) * sig.progress;
                let cy = pA.y + (pB.y - pA.y) * sig.progress;
                let cz = pA.z3 + (pB.z3 - pA.z3) * sig.progress;

                // create trail ray (comet)
                let tailProgress = Math.max(0, sig.progress - 0.4);
                let tx = pA.x + (pB.x - pA.x) * tailProgress;
                let ty = pA.y + (pB.y - pA.y) * tailProgress;

                let alpha = 1 - (cz / (RADIUS * 3));
                if (alpha < 0) alpha = 0;
                let baseScale = pA.scale + (pB.scale - pA.scale) * sig.progress;

                let grad = ctx.createLinearGradient(cx, cy, tx, ty);
                grad.addColorStop(0, `rgba(255, 255, 255, ${Math.min(1, alpha * 2)})`);
                grad.addColorStop(1, `rgba(255, 255, 255, 0)`);

                ctx.shadowBlur = 0; // Turn off shadowBlur for smooth blending
                ctx.strokeStyle = grad;
                ctx.lineWidth = 4 * baseScale;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(cx, cy);
                ctx.stroke();

                // Realistic Comet Head (Radial Gradient Glow)
                let headRadius = 16 * baseScale; // Expand radius for natural fade
                if (headRadius > 0.1) {
                    let headGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, headRadius);
                    headGrad.addColorStop(0, `rgba(255, 255, 255, ${Math.min(1, alpha * 2.5)})`); // Hot center
                    headGrad.addColorStop(0.15, `rgba(200, 240, 255, ${Math.min(1, alpha * 1.5)})`); // Inner halo
                    headGrad.addColorStop(0.5, `rgba(100, 200, 255, ${Math.min(1, alpha * 0.4)})`); // Soft edge
                    headGrad.addColorStop(1, `rgba(0, 150, 255, 0)`); // Dissolve

                    ctx.fillStyle = headGrad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, headRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        drawBg();
    </script>
</body>

</html>
